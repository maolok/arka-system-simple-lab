server:
  port: 8080
spring:
  application:
    name: "KafkaPoc"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
  kafka:
    consumer:
      bootstrap-servers: "localhost:9092"
      group-id: "KafkaPoc"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
adapters:
  kafka:
    consumer:
      topic: "test-with-registries"
